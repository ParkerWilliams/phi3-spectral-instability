# Default run config for `just sim` (feature 001-headless-sim-telemetry).
#
# map: LibreQuake BSP stem (confirmed live 2026-06-02, feature 001 US1). lq_e1m1
# is the first SP level — it has info_player_start, required since the launcher
# runs deathmatch 0. NOTE: no trigger_secret (secrets_total=0); pick a
# secret-bearing map for US2 secret tests. Provenance in docs/licenses.md; the
# LibreQuake paks live in id1/ (gitignored runtime data).
map = "lq_e1m1"
seed = 1
time_limit = 120

# Agent tunables (bot_* — see docs/bot-stats.md). Any key omitted here falls back
# to its catalogue default; every value is clamped to its documented range and
# recorded (clamped) in the summary's bot_config.
[bot]
bot_accuracy = 0.3
# Master competence dial (feature 003). Pinned to 1.0 (veteran) so the locomotion
# feel curve — move-throttle + junction-dwell — is INERT and only the always-on
# whisker anti-scrape affects nav metrics. Sweep 0.2 vs 1.0 to see the motion arc.
bot_competence = 1.0
